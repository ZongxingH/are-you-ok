name: change-lifecycle
description: 多 Agent 自主完成 OpenSpec change 到归档候选
states:
  created:
    next: spec_planning
  spec_planning:
    agent: spec
    next: spec_review
  spec_review:
    agent: review
    command: auok validate {change}
    on_pass: implementing
    on_fail: spec_planning
  implementing:
    agent: dev
    next: qa_running
  qa_running:
    agent: qa
    commands:
      - auok validate {change}
      - auok verify {change}
    on_pass: qa_verified
    on_fail: fixing
  qa_verified:
    agent: review
    next: review_running
  review_running:
    agent: review
    command: auok agent handoff {change} --from review --to archive --status pass --summary "review passed" --evidence "auok/orchestration/states/{change}.json" --required-action "prepare archive-to-human handoff" --commands "auok validate {change},auok verify {change}" --next-state ready_for_archive
    on_pass: ready_for_archive
    on_fail: fixing
  fixing:
    agent: dev
    next: qa_running
  ready_for_archive:
    agent: archive
    commands:
      - auok agent handoff {change} --from archive --to human --status ready --summary "archive candidate ready" --evidence "auok/orchestration/states/{change}.json,auok/orchestration/handoffs/{change}/review-to-archive.json" --required-action "human confirms /auok archive {change}" --commands "auok validate {change},auok verify {change},auok lifecycle ready-for-archive {change}" --next-state ready_for_archive
      - auok lifecycle ready-for-archive {change}
    requires_human_approval: true
    next: waiting_human_approval

name: harness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: AUOK_HOME=. npm run auok -- validate --all
      - run: AUOK_HOME=. npm run auok -- run --capability smoke --adapter mock --out runs/ci
      - run: AUOK_HOME=. npm run auok -- grade runs/ci
      - run: AUOK_HOME=. npm run auok -- report runs/ci
      - run: AUOK_HOME=. npm run auok -- gate runs/ci --min-pass-rate 1.0 --no-critical-failures
